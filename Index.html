html, body { margin: 0; background: #0d0d14; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px 60px; }

/* Phone shell */
.phone-shell {
  position: relative;
  width: 430px;
  flex-shrink: 0;
  background: #1a1a2e;
  border-radius: 54px;
  padding: 14px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 0 0 2px rgba(255,255,255,0.04),
    0 40px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(99,102,241,0.15),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 rgba(0,0,0,0.5);
}

/* Side buttons */
.phone-shell::before {
  content: '';
  position: absolute;
  left: -3px;
  top: 120px;
  width: 3px;
  height: 36px;
  background: #2a2a3e;
  border-radius: 3px 0 0 3px;
  box-shadow: 0 50px 0 #2a2a3e, 0 100px 0 #2a2a3e;
}
.phone-shell::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 160px;
  width: 3px;
  height: 70px;
  background: #2a2a3e;
  border-radius: 0 3px 3px 0;
}

/* Screen area */
.phone-screen {
  position: relative;
  border-radius: 42px;
  overflow: hidden;
  background: #000;
  width: 100%;
  height: 844px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
}

/* Scrollable content inside phone */
.phone-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 88px;
}
.phone-scroll::-webkit-scrollbar { display: none; }

#nav-root {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
}

/* Dynamic island */
.dynamic-island {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 100;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.dynamic-island .camera {
  width: 12px; height: 12px;
  background: #0d0d0d;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.dynamic-island .camera::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 5px; height: 5px;
  background: #1a1a2e;
  border-radius: 50%;
}
.dynamic-island .speaker {
  width: 52px; height: 6px;
  background: #0d0d0d;
  border-radius: 3px;
}

/* Reflection sheen */
.phone-sheen {
  position: absolute;
  top: 14px; left: 14px; right: 14px;
  height: 180px;
  border-radius: 42px 42px 0 0;
  background: linear-gradient(160deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 200;
}

/* Page background */
.page-bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(124,58,237,0.08) 0%, transparent 55%),

}

/* Glass panel card */
.panel-card {

  border-radius: 20px;
  padding: 20px;

function DonutChart() {
  const radius = 90;
  const circumference = 2 * Math.PI * radius;
  const debitsPct = 0.992;
  const debitsArc = debitsPct * circumference - 4;
  const assetsArc = Math.max(circumference * 0.008 - 4, 6);
  const debitsOffset = circumference / 4;
  const assetsOffset = circumference / 4 - debitsArc - 4;
  const size = 220;
  const cx = size / 2; const cy = size / 2;

  const [animated, setAnimated] = useState(false);
  const [countVal, setCountVal]  = useState(0);
  const chartRef = React.useRef(null);

  // Trigger on scroll into view
  React.useEffect(() => {
    const el = chartRef.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setAnimated(true); observer.disconnect(); } },
      { threshold: 0.4 }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);

  // Count-up number when animated
  React.useEffect(() => {
    if (!animated) return;
    const target = 99.2;
    const duration = 1200;
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / duration, 1);
      // ease-out cubic
      const ease = 1 - Math.pow(1 - p, 3);
      setCountVal(+(target * ease).toFixed(1));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [animated]);

  // Animate arc lengths from 0 → final
  const currentDebitsArc = animated ? debitsArc : 0;
  const currentAssetsArc = animated ? assetsArc : 0;

  return (
    <svg ref={chartRef} width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-label="Net worth donut">
      <defs>
        <filter id="glow-blue">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-purple">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Track */}
      <circle cx={cx} cy={cy} r={radius} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={22}/>

      {/* Debits arc */}
      <circle cx={cx} cy={cy} r={radius} fill="none" stroke="#5B6CF9" strokeWidth={22}
        strokeLinecap="round" filter="url(#glow-blue)"
        strokeDasharray={`${currentDebitsArc} ${circumference}`}
        strokeDashoffset={debitsOffset}
        style={{ transition: animated ? "stroke-dasharray 1.2s cubic-bezier(0.34,1.2,0.64,1)" : "none" }}/>

      {/* Assets arc */}
      <circle cx={cx} cy={cy} r={radius} fill="none" stroke="#C084FC" strokeWidth={22}
        strokeLinecap="round" filter="url(#glow-purple)"
        strokeDasharray={`${currentAssetsArc} ${circumference}`}
        strokeDashoffset={assetsOffset}
        style={{ transition: animated ? "stroke-dasharray 1.4s cubic-bezier(0.34,1.2,0.64,1) 0.3s" : "none" }}/>

      {/* Spinning highlight dot — only while animating */}
      {animated && countVal < 99.2 && (
        <circle cx={cx} cy={cy - radius} r={5} fill="white" opacity="0.9"
          style={{ transformOrigin:`${cx}px ${cy}px`,
            animation:"spin-dot 1.2s cubic-bezier(0.34,1.2,0.64,1) forwards" }}/>
      )}

      {/* Center count-up */}
      <text x={cx} y={cy - 8} textAnchor="middle" dominantBaseline="middle"
        fill="white" fontSize="28" fontFamily="Helvetica Neue, Helvetica, sans-serif"
        fontWeight="600" letterSpacing="-0.5">
        {countVal.toFixed(1)}
      </text>
      <text x={cx} y={cy + 18} textAnchor="middle" dominantBaseline="middle"
        fill="rgba(255,255,255,0.55)" fontSize="13" fontFamily="Helvetica Neue, Helvetica, sans-serif">%</text>
    </svg>
  );
}

function SwipeableCards() {
  const [activeIndex, setActiveIndex] = useState(0);
  const [dragX, setDragX] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const startXRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const total = bankCards.length;

  const getClient = (e) => e.touches ? e.touches[0].clientX : e.clientX;

  const onDragStart = (e) => {
    startXRef.current = getClient(e);
    setIsDragging(true);
  };
  const onDragMove = (e) => {
    if (!isDragging || startXRef.current === null) return;
    const diff = getClient(e) - startXRef.current;
    setDragX(diff);
  };
  const onDragEnd = () => {
    if (!isDragging) return;
    setIsDragging(false);
    if (dragX < -50 && activeIndex < total - 1) setActiveIndex(i => i + 1);
    else if (dragX > 50 && activeIndex > 0)     setActiveIndex(i => i - 1);
    setDragX(0);
    startXRef.current = null;
  };

  // Stack config: show up to 3 cards behind the active one
  const stackOffsets = [0, 8, 16, 22]; // y offset per layer
  const stackScales  = [1, 0.93, 0.86, 0.80];

  return (
    <div className="panel-card flex flex-col gap-4 w-full" style={{ overflow: "hidden" }}>
      <SectionHeader title="My cards"/>

      {/* Card stack + swipe area */}
      <div
        ref={containerRef}
        style={{ position: "relative", height: 200, width: "100%",
          display: "flex", alignItems: "flex-end", justifyContent: "center",
          cursor: isDragging ? "grabbing" : "grab" }}
        onMouseDown={onDragStart}
        onMouseMove={onDragMove}
        onMouseUp={onDragEnd}
        onMouseLeave={onDragEnd}
        onTouchStart={onDragStart}
        onTouchMove={onDragMove}
        onTouchEnd={onDragEnd}
      >
        {/* Render cards from back to front */}
        {[...Array(Math.min(4, total))].map((_, layerIndex) => {
          const cardIndex = activeIndex + (3 - layerIndex); // back layers first
          if (cardIndex >= total) return null;
          const isTop = cardIndex === activeIndex;
          const depth = cardIndex - activeIndex; // 0 = top, 1 = one behind, etc.
          const depthIdx = Math.min(depth, 3);

          const translateY = stackOffsets[depthIdx];
          const scale = stackScales[depthIdx];
          const translateX = isTop ? dragX : 0;
          const opacity = depthIdx > 2 ? 0 : 1;

          const transition = isDragging && isTop
            ? "none"
            : "transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.3s ease";

          // Tilt slightly on drag
          const rotate = isTop ? dragX * 0.04 : 0;

          return (
            <CardFace
              key={bankCards[cardIndex].id}
              card={bankCards[cardIndex]}
              isTop={isTop}
              style={{
                bottom: 0,
                left: "50%",
                marginLeft: -135,
                transform: `translateX(${translateX}px) translateY(-${translateY}px) scale(${scale}) rotate(${rotate}deg)`,
                transition,
                opacity,
                zIndex: 10 - depthIdx,
              }}
            />
          );
        })}
      </div>

      {/* Dot indicators */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, height: 8 }}>
        {bankCards.map((_, i) => (
          <div
            key={i}
            onClick={() => setActiveIndex(i)}
            style={{
              height: 8,
              borderRadius: 100,
              cursor: "pointer",
              background: i === activeIndex ? "#6598f0" : "rgba(26,52,97,1)",
              width: i === activeIndex ? 28 : 8,
              transition: "all 0.3s ease",
            }}
          />
        ))}
      </div>
    </div>
  );
}

// ─── SPENDING CHART ──────────────────────────────────────────────────────────

const spendingData = [
  { day: "1",  amount: 3200  },
  { day: "6",  amount: 7800  },
  { day: "11", amount: 5400  },
  { day: "16", amount: 12500 },
  { day: "21", amount: 9100  },
  { day: "26", amount: 17300 },
  { day: "30", amount: 20000 },
];

function SpendingChart() {
  const [activePoint, setActivePoint] = useState(null);
  const W = 295, H = 72;
  const PAD = { top: 12, bottom: 4, left: 4, right: 4 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const maxAmt = Math.max(...spendingData.map(d => d.amount));

  const pts = spendingData.map((d, i) => ({
    ...d,
    x: PAD.left + (i / (spendingData.length - 1)) * innerW,
    y: PAD.top + innerH - (d.amount / maxAmt) * innerH,
  }));

  // Smooth curve via cubic bezier
  const curve = pts.reduce((acc, pt, i) => {
    if (i === 0) return `M ${pt.x},${pt.y}`;
    const prev = pts[i - 1];
    const cpX = (prev.x + pt.x) / 2;
    return acc + ` C ${cpX},${prev.y} ${cpX},${pt.y} ${pt.x},${pt.y}`;
  }, "");

  const areaPath = curve + ` L ${pts[pts.length-1].x},${H} L ${pts[0].x},${H} Z`;

  return (
    <div className="panel-card flex flex-col gap-2.5 w-full">
      <div className="flex items-start justify-between w-full">
        <MoneyAmount label="You spent this month" amount={activePoint ? activePoint.amount.toLocaleString() : "20,000"}/>
        <img src="https://c.animaapp.com/1v3dLG4K/img/chevron-right-6.svg" alt="" className="w-5 h-5 mt-1"/>
      </div>

      <div className="flex flex-col items-end gap-0.5 w-full" style={{ position: "relative" }}>
        {/* Peak label */}
        <span className="hn-med text-blue-300 text-[8px] tracking-tight leading-normal">
          EGP {activePoint ? activePoint.amount.toLocaleString() + ".00" : "20,000.00"}
        </span>

        {/* Chart */}
        <svg
          width="100%" viewBox={`0 0 ${W} ${H}`}
          style={{ overflow: "visible", cursor: "crosshair" }}
          onMouseLeave={() => setActivePoint(null)}
          onTouchEnd={() => setTimeout(() => setActivePoint(null), 1800)}
        >
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#6598F0" stopOpacity="0.35"/>
              <stop offset="100%" stopColor="#6598F0" stopOpacity="0.03"/>
            </linearGradient>
          </defs>

          {/* Area fill */}
          <path d={areaPath} fill="url(#areaGrad)"/>

          {/* Line */}
          <path d={curve} fill="none" stroke="#6598F0" strokeWidth="1.8" strokeLinecap="round"/>

          {/* Hover hit zones + dots */}
          {pts.map((pt, i) => {
            const isActive = activePoint && activePoint.day === pt.day;
            return (
              <g key={i}>
                {/* invisible wide hit area */}
                <rect
                  x={pt.x - 18} y={0} width={36} height={H}
                  fill="transparent"
                  onMouseEnter={() => setActivePoint(pt)}
                  onTouchStart={() => setActivePoint(pt)}
                  style={{ cursor: "pointer" }}
                />
                {/* visible dot — only when active */}
                {isActive && (
                  <>
                    {/* vertical guide line */}
                    <line x1={pt.x} y1={pt.y} x2={pt.x} y2={H}
                      stroke="rgba(101,152,240,0.35)" strokeWidth="1" strokeDasharray="3,3"/>
                    {/* outer glow ring */}
                    <circle cx={pt.x} cy={pt.y} r={8} fill="rgba(101,152,240,0.2)"/>
                    {/* dot */}
                    <circle cx={pt.x} cy={pt.y} r={4} fill="#6598F0" stroke="#fff" strokeWidth="1.5"/>
                    {/* tooltip */}
                    <g transform={`translate(${Math.min(Math.max(pt.x - 38, 0), W - 76)}, ${pt.y - 38})`}>
                      <rect x={0} y={0} width={76} height={24} rx={6}
                        fill="rgba(10,22,40,0.95)" stroke="rgba(101,152,240,0.4)" strokeWidth="1"/>
                      <text x={38} y={15} textAnchor="middle"
                        fill="#93C5FD" fontSize="10"
                        fontFamily="Helvetica Neue-Medium, Helvetica, sans-serif">
                        EGP {pt.amount.toLocaleString()}
                      </text>
                    </g>
                  </>
                )}
                {/* always-visible subtle dot */}
                {!isActive && (
                  <circle cx={pt.x} cy={pt.y} r={2} fill="rgba(101,152,240,0.5)"/>
                )}
              </g>
            );
          })}
        </svg>

        {/* Baseline */}
        <div style={{ width: "100%", height: 1, background: "rgba(101,152,240,0.2)" }}/>

        {/* Day labels */}
        <div style={{ display: "flex", justifyContent: "space-between", width: "100%", marginTop: 4 }}>
          {pts.map(pt => (
            <span key={pt.day}
              className="hn-reg text-[8px]"
              style={{
                color: activePoint && activePoint.day === pt.day ? "rgba(147,197,253,1)" : "rgba(101,152,240,1)",
                fontWeight: activePoint && activePoint.day === pt.day ? "600" : "400",
                transition: "color 0.2s",
              }}>
              {pt.day}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

function EyeIcon({ open }) {

    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(147,197,253,0.8)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>

  ) : (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(147,197,253,0.8)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  );
}

        <button key={i} style={{ display:"flex",alignItems:"center",gap:14,
          background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",
          borderRadius:18,padding:"16px 18px",cursor:"pointer",textAlign:"left",width:"100%",
          transition:"border-color 0.2s" }}
          onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(147,197,253,0.25)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.07)"}>
          <div style={{ width:48,height:48,borderRadius:14,background:"rgba(37,99,235,0.15)",
            border:"1px solid rgba(147,197,253,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
            <img src={p.icon} style={{ width:24,height:24 }}/>
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"'Helvetica Neue-Bold',Helvetica",color:"#fff",fontSize:14,marginBottom:3 }}>{p.title}</div>
            <div style={{ fontFamily:"'Helvetica Neue-Regular',Helvetica",color:"rgba(255,255,255,0.45)",fontSize:12 }}>{p.subtitle}</div>
          </div>
          <div style={{ display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6 }}>
            <span style={{ fontFamily:"'Helvetica Neue-Medium',Helvetica",fontSize:10,
              color:p.tagColor,background:`${p.tagColor.replace("0.9","0.1")}`,
              padding:"3px 8px",borderRadius:6 }}>{p.tag}</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </button>
      ))}
    </PlaceholderPage>
  );
}

function HelpPage() {
  const faqs = [
    { q:"How do I freeze my card?", a:"Go to Account Details → tap Freeze. Your card will be blocked immediately." },
    { q:"How long does a transfer take?", a:"Transfers to D.Bank accounts are instant. Other banks take up to 2 hours." },
    { q:"What are the transfer limits?", a:"EGP 50,000 per day for digital transfers. Contact support to increase your limit." },
    { q:"How do I get my bank statement?", a:"Go to Account Details → tap Statement to download a PDF." },
  ];
  const [open, setOpen] = useState(null);
  return (
    <PlaceholderPage title="Help center" icon="https://c.animaapp.com/1v3dLG4K/img/life-buoy.svg"
      description="We're here whenever you need us">
      {/* Contact options */}
      <div style={{ display:"flex",gap:10 }}>
        {[
          { label:"Live chat", icon:"💬", color:"rgba(37,99,235,0.8)" },
          { label:"Call us",   icon:"📞", color:"rgba(124,58,237,0.8)" },
        ].map((c,i)=>(
          <button key={i} style={{ flex:1,padding:"16px 0",borderRadius:16,border:"none",cursor:"pointer",
            background:c.color,fontFamily:"'Helvetica Neue-Bold',Helvetica",color:"#fff",fontSize:14,
            display:"flex",flexDirection:"column",alignItems:"center",gap:6 }}>
            <span style={{ fontSize:22 }}>{c.icon}</span>
            {c.label}
          </button>
        ))}
      </div>
      {/* FAQs */}
      <div className="panel-card" style={{ padding:"16px 20px" }}>
        <div style={{ fontFamily:"'Helvetica Neue-Bold',Helvetica",color:"#fff",fontSize:13,marginBottom:12 }}>Frequently asked</div>
        {faqs.map((f,i)=>(
          <div key={i} style={{ borderBottom: i<faqs.length-1?"1px solid rgba(255,255,255,0.06)":"none" }}>
            <button onClick={()=>setOpen(open===i?null:i)} style={{ display:"flex",alignItems:"center",
              justifyContent:"space-between",width:"100%",background:"none",border:"none",
              cursor:"pointer",padding:"12px 0",textAlign:"left" }}>
              <span style={{ fontFamily:"'Helvetica Neue-Medium',Helvetica",color:"#fff",fontSize:13,flex:1,paddingRight:12 }}>{f.q}</span>
              <svg style={{ transform:open===i?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0 }}
                width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            {open===i && (
              <div style={{ fontFamily:"'Helvetica Neue-Regular',Helvetica",color:"rgba(255,255,255,0.5)",
                fontSize:12,lineHeight:1.7,paddingBottom:12 }}>{f.a}</div>
            )}
          </div>
        ))}
      </div>
    </PlaceholderPage>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
