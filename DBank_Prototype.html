html, body { margin: 0; background: #0d0d14; min-height: 100vh; display: flex; flex-direction: row; align-items: flex-start; justify-content: center; padding: 40px 20px 60px; gap: 32px; }

/* Outside toggle button */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  align-self: flex-start;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  padding: 6px 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.theme-toggle:hover { background: rgba(255,255,255,0.1); }
.theme-toggle .toggle-pill {
  width: 88px;
  height: 34px;
  background: rgba(255,255,255,0.08);
  border-radius: 100px;
  position: relative;
  transition: background 0.3s ease;
}
.theme-toggle .toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.theme-toggle.light-mode .toggle-thumb { transform: translateX(54px); }
.theme-toggle.light-mode { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
.theme-toggle .toggle-label {
  font-family: 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  padding: 0 8px;
  letter-spacing: -0.1px;
  white-space: nowrap;
  transition: color 0.2s;
  min-width: 68px;
  text-align: center;
}

/* Phone shell */
.phone-shell {
  position: relative;
  width: 430px;
  flex-shrink: 0;
  background: #1a1a2e;
  border-radius: 54px;
  padding: 14px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 0 0 2px rgba(255,255,255,0.04),
    0 40px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(99,102,241,0.15),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 rgba(0,0,0,0.5);
}

/* Side buttons */
.phone-shell::before {
  content: '';
  position: absolute;
  left: -3px;
  top: 120px;
  width: 3px;
  height: 36px;
  background: #2a2a3e;
  border-radius: 3px 0 0 3px;
  box-shadow: 0 50px 0 #2a2a3e, 0 100px 0 #2a2a3e;
}
.phone-shell::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 160px;
  width: 3px;
  height: 70px;
  background: #2a2a3e;
  border-radius: 0 3px 3px 0;
}

/* Screen area */
.phone-screen {
  position: relative;
  border-radius: 42px;
  overflow: hidden;
  background: #000;
  width: 100%;
  height: 844px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
}

/* Scrollable content inside phone */
.phone-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 88px;
}
.phone-scroll::-webkit-scrollbar { display: none; }

#nav-root {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
}

/* Fixed status bar */
.status-bar {
  position: relative;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 44px;
  padding: 0 20px 0 26px;
  flex-shrink: 0;
  color: #fff;
  background: transparent;
}
.status-bar[data-theme="light"] {
  color: #1A0938;
}
.status-bar__time {
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  line-height: 1;
}
.status-bar__icons {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Dynamic island */
.dynamic-island {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 100;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.dynamic-island .camera {
  width: 12px; height: 12px;
  background: #0d0d0d;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.dynamic-island .camera::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 5px; height: 5px;
  background: #1a1a2e;
  border-radius: 50%;
}
.dynamic-island .speaker {
  width: 52px; height: 6px;
  background: #0d0d0d;
  border-radius: 3px;
}

/* Reflection sheen */
.phone-sheen {
  position: absolute;
  top: 14px; left: 14px; right: 14px;
  height: 180px;
  border-radius: 42px 42px 0 0;
  background: linear-gradient(160deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 200;
}

/* Page background */
.page-bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(124,58,237,0.08) 0%, transparent 55%),
              #0d0d14;
  z-index: -1;
}

/* Glass panel card */
.panel-card {
  position: relative;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0px 3px 6px #00000021,
    inset 0 1px 0 rgba(255,255,255,0.40),
    inset 1px 0 0 rgba(255,255,255,0.32),
    inset 0 -1px 25px rgba(0,0,0,0.16),
    inset -1px 0 25px rgba(0,0,0,0.13);
  -webkit-backdrop-filter: blur(38px) brightness(100%) saturate(105%);
  backdrop-filter: blur(38px) brightness(100%) saturate(105%);
  background: linear-gradient(60deg, rgba(13,31,60,0.2) 0%, rgba(37,99,235,0.2) 50%, rgba(124,58,237,0.2) 100%);
}
.panel-card::before {
  content: '';
  position: absolute;
  inset: 0;
  padding: 1px;
  border-radius: 20px;
  background: linear-gradient(60deg, rgba(124,58,237,0.3) 0%, rgba(37,99,235,0.3) 45%, rgba(255,255,255,0.3) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  z-index: 1;
  pointer-events: none;
}

/* Glass mini card */
.glass-card {
  flex: 1;
  min-width: 0;
  height: 145px;
  position: relative;
  border-radius: 16px;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-end;
  gap: 4px;
  background: rgba(37, 99, 235, 0.15);
  -webkit-backdrop-filter: blur(2px) brightness(100%) saturate(100%) hue-rotate(-5deg);
  backdrop-filter: blur(2px) brightness(100%) saturate(100%) hue-rotate(-5deg);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.40),
    inset 1px 0 0 rgba(255,255,255,0.32),
    inset 0 -1px 1px rgba(0,0,0,0.15),
    inset -1px 0 1px rgba(0,0,0,0.12);
}
.glass-card::before {
  content: '';
  position: absolute;
  inset: 0;
  padding: 1px;
  border-radius: 16px;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  z-index: 1;
  pointer-events: none;
}
.glass-card-g1::before { background: linear-gradient(90deg, rgba(6,6,6,0.5) 0%, rgba(37,99,235,0.5) 52%, rgba(124,58,237,0.5) 100%); }

/* ── Design tokens ─────────────────────────────────────────────────── */
/* Dark mode text scale */
:root {
  --txt-d-primary:   #E8EEFF;           /* headings, amounts, names   */
  --txt-d-secondary: rgba(232,238,255,0.55); /* labels, meta           */
  --txt-d-muted:     rgba(232,238,255,0.35); /* placeholders, hints    */
  --txt-d-accent:    rgba(147,197,253,1);    /* blue accent            */
  /* Light mode text scale */
  --txt-l-primary:   #1A0938;
  --txt-l-secondary: rgba(26,9,56,0.55);
  --txt-l-muted:     rgba(26,9,56,0.35);
  --txt-l-accent:    #1D4ED8;
  /* Shared */
  --radius-card:     20px;
  --radius-mini:     16px;
  --radius-btn:      12px;
  --gap-card:        16px;   /* internal panel card gap  */
  --gap-sections:    20px;   /* between sections in flow */
}

/* ── Light mode — exact Figma token values ───────────────────────── */
/* Tokens: purple-950=#1A0938, blue-950=#0A1628, blue-700=#1D4ED8,   */
/* blue-600=#2563EB, purple-800=#461A8A, purple-500=#A855F7,          */
/* neutral-50=#FAFAFA, neutral-100=#F5F5F5, neutral-200=#E5E5E5,      */
/* neutral-400=#A3A3A3, neutral-600=#404040                            */

[data-theme="light"] { color: #1A0938; background: #FAFAFA; }
[data-theme="light"] .bg-black { background: #FAFAFA !important; }
.phone-screen[data-light], .phone-scroll[data-light] { background: #FAFAFA !important; }

/* Text — light mode class overrides (fallback for Tailwind classes) */
[data-theme="light"] .text-white        { color: var(--txt-l-primary) !important; }
[data-theme="light"] .text-neutral-200  { color: var(--txt-l-secondary) !important; }
[data-theme="light"] .text-blue-400     { color: var(--txt-l-accent) !important; }
[data-theme="light"] .text-blue-300     { color: #461A8A !important; }

/* Panel cards — Figma light glass (same structure as dark, adapted to light bg) */
[data-theme="light"] .panel-card {
  background: linear-gradient(232deg, rgba(255,255,255,0.60) 0%, rgba(216,180,254,0.08) 51%, rgba(147,197,253,0) 100%) !important;
  -webkit-backdrop-filter: blur(38px) brightness(100%) saturate(105%) !important;
  backdrop-filter: blur(38px) brightness(100%) saturate(105%) !important;

    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 1px 0 0 rgba(255,255,255,0.80),
    inset 0 -1px 25px rgba(0,0,0,0.04),
    inset -1px 0 25px rgba(0,0,0,0.03) !important;
}
/* ::before gradient border stays the same — subtle purple→blue outline */

/* Glass mini cards — Figma light: subtle purple tint, glass border */
[data-theme="light"] .glass-card {
  background: linear-gradient(135deg, rgba(99,102,241,0.10) 0%, rgba(37,99,235,0.08) 60%, rgba(124,58,237,0.06) 100%) !important;

<script>
let _currentTheme = 'dark';
function toggleTheme() {
  _currentTheme = _currentTheme === 'dark' ? 'light' : 'dark';
  const btn = document.getElementById('theme-toggle-btn');
  const label = document.getElementById('toggle-label');
  const thumb = document.getElementById('toggle-thumb');
  if (_currentTheme === 'light') {
    btn.classList.add('light-mode');
    label.textContent = 'Dark mode';
    thumb.textContent = '☀️';
  } else {
    btn.classList.remove('light-mode');
    label.textContent = 'Light mode';
    thumb.textContent = '🌙';
  }
  window.dispatchEvent(new CustomEvent('theme-change', { detail: _currentTheme }));
}
</script>

function DonutChart() {
  const theme = useTheme();
  const isDark = theme === 'dark';
  const radius = 90;
  const circumference = 2 * Math.PI * radius;
  const debitsPct = 0.992;
  const debitsArc = debitsPct * circumference - 4;
  const assetsArc = Math.max(circumference * 0.008 - 4, 6);
  const debitsOffset = circumference / 4;
  const assetsOffset = circumference / 4 - debitsArc - 4;
  const size = 220;
  const cx = size / 2; const cy = size / 2;

  const [animated, setAnimated] = useState(false);
  const [countVal, setCountVal]  = useState(0);
  const chartRef = React.useRef(null);

  // Trigger on scroll into view
  React.useEffect(() => {
    const el = chartRef.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setAnimated(true); observer.disconnect(); } },
      { threshold: 0.4 }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);

  // Count-up number when animated
  React.useEffect(() => {
    if (!animated) return;
    const target = 99.2;
    const duration = 1200;
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / duration, 1);
      // ease-out cubic
      const ease = 1 - Math.pow(1 - p, 3);
      setCountVal(+(target * ease).toFixed(1));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [animated]);

  // Animate arc lengths from 0 → final
  const currentDebitsArc = animated ? debitsArc : 0;
  const currentAssetsArc = animated ? assetsArc : 0;

  return (
    <svg ref={chartRef} width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-label="Net worth donut">
      <defs>
        {/* Dark mode — strong glow */}
        <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        {/* Light mode — soft subtle glow */}
        <filter id="glow-blue-light" x="-15%" y="-15%" width="130%" height="130%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feComponentTransfer in="blur" result="fade">
            <feFuncA type="linear" slope="0.35"/>
          </feComponentTransfer>
          <feMerge><feMergeNode in="fade"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-purple-light" x="-15%" y="-15%" width="130%" height="130%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feComponentTransfer in="blur" result="fade">
            <feFuncA type="linear" slope="0.3"/>
          </feComponentTransfer>
          <feMerge><feMergeNode in="fade"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Track */}
      <circle cx={cx} cy={cy} r={radius} fill="none" stroke={isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.08)"} strokeWidth={22}/>

      {/* Debits arc */}
      <circle cx={cx} cy={cy} r={radius} fill="none"
        stroke={isDark ? "#5B6CF9" : "#1D4ED8"} strokeWidth={22}
        strokeLinecap="round" filter={isDark ? "url(#glow-blue)" : "url(#glow-blue-light)"}
        strokeDasharray={`${currentDebitsArc} ${circumference}`}
        strokeDashoffset={debitsOffset}
        style={{ transition: animated ? "stroke-dasharray 1.2s cubic-bezier(0.34,1.2,0.64,1)" : "none" }}/>

      {/* Assets arc */}
      <circle cx={cx} cy={cy} r={radius} fill="none"
        stroke={isDark ? "#C084FC" : "#A855F7"} strokeWidth={22}
        strokeLinecap="round" filter={isDark ? "url(#glow-purple)" : "url(#glow-purple-light)"}
        strokeDasharray={`${currentAssetsArc} ${circumference}`}
        strokeDashoffset={assetsOffset}
        style={{ transition: animated ? "stroke-dasharray 1.4s cubic-bezier(0.34,1.2,0.64,1) 0.3s" : "none" }}/>

      {/* Center white fill (light mode) */}
      {!isDark ? null : null}
      <circle cx={cx} cy={cy} r={isDark ? 0 : 68}
        fill={isDark ? "none" : "white"}
        style={{ filter: isDark ? "none" : "drop-shadow(0 0 12px rgba(0,0,0,0.08))" }}/>

      {/* Spinning highlight dot — only while animating in dark */}
      {isDark && animated && countVal < 99.2 && (
        <circle cx={cx} cy={cy - radius} r={5} fill="white" opacity="0.9"
          style={{ transformOrigin:`${cx}px ${cy}px`,
            animation:"spin-dot 1.2s cubic-bezier(0.34,1.2,0.64,1) forwards" }}/>
      )}

      {/* Center count-up */}
      <text x={cx} y={cy - 8} textAnchor="middle" dominantBaseline="middle"
        fill={isDark ? "white" : "#0a1628"} fontSize="28" fontFamily="Helvetica Neue, Helvetica, sans-serif"
        fontWeight="600" letterSpacing="-0.5">
        {countVal.toFixed(1)}
      </text>
      <text x={cx} y={cy + 18} textAnchor="middle" dominantBaseline="middle"
        fill={isDark ? "rgba(255,255,255,0.55)" : "rgba(10,22,40,0.55)"} fontSize="13" fontFamily="Helvetica Neue, Helvetica, sans-serif">%</text>
    </svg>
  );
}

function SwipeableCards() {
  const [activeIndex, setActiveIndex] = useState(0);
  const [dragX, setDragX] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const startXRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const theme = useTheme();
  const isDark = theme === 'dark';
  const total = bankCards.length;

  const getClient = (e) => e.touches ? e.touches[0].clientX : e.clientX;

  const onDragStart = (e) => {
    startXRef.current = getClient(e);
    setIsDragging(true);
  };
  const onDragMove = (e) => {
    if (!isDragging || startXRef.current === null) return;
    const diff = getClient(e) - startXRef.current;
    setDragX(diff);
  };
  const onDragEnd = () => {
    if (!isDragging) return;
    setIsDragging(false);
    if (dragX < -50 && activeIndex < total - 1) setActiveIndex(i => i + 1);
    else if (dragX > 50 && activeIndex > 0)     setActiveIndex(i => i - 1);
    setDragX(0);
    startXRef.current = null;
  };

  // Stack config: show up to 3 cards behind the active one
  const stackOffsets = [0, 8, 16, 22]; // y offset per layer
  const stackScales  = [1, 0.93, 0.86, 0.80];

  return (
    <div className="panel-card flex flex-col gap-2 w-full" style={{ overflow: "hidden" }}>
      <SectionHeader title="My cards"/>

      {/* Card stack + swipe area */}
      <div
        ref={containerRef}
        style={{ position: "relative", height: 200, width: "100%",
          display: "flex", alignItems: "flex-end", justifyContent: "center",
          cursor: isDragging ? "grabbing" : "grab" }}
        onMouseDown={onDragStart}
        onMouseMove={onDragMove}
        onMouseUp={onDragEnd}
        onMouseLeave={onDragEnd}
        onTouchStart={onDragStart}
        onTouchMove={onDragMove}
        onTouchEnd={onDragEnd}
      >
        {/* Render cards from back to front */}
        {[...Array(Math.min(4, total))].map((_, layerIndex) => {
          const cardIndex = activeIndex + (3 - layerIndex); // back layers first
          if (cardIndex >= total) return null;
          const isTop = cardIndex === activeIndex;
          const depth = cardIndex - activeIndex; // 0 = top, 1 = one behind, etc.
          const depthIdx = Math.min(depth, 3);

          const translateY = stackOffsets[depthIdx];
          const scale = stackScales[depthIdx];
          const translateX = isTop ? dragX : 0;
          const opacity = depthIdx > 2 ? 0 : 1;

          const transition = isDragging && isTop
            ? "none"
            : "transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.3s ease";

          // Tilt slightly on drag
          const rotate = isTop ? dragX * 0.04 : 0;

          return (
            <CardFace
              key={bankCards[cardIndex].id}
              card={bankCards[cardIndex]}
              isTop={isTop}
              style={{
                bottom: 0,
                left: "50%",
                marginLeft: -135,
                transform: `translateX(${translateX}px) translateY(-${translateY}px) scale(${scale}) rotate(${rotate}deg)`,
                transition,
                opacity,
                zIndex: 10 - depthIdx,
              }}
            />
          );
        })}
      </div>

      {/* Dot indicators */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, height: 8, marginTop: 8 }}>
        {bankCards.map((_, i) => (
          <div
            key={i}
            onClick={() => setActiveIndex(i)}
            style={{
              height: 8,
              borderRadius: 100,
              cursor: "pointer",
              background: i === activeIndex ? "#5B6CF9" : (isDark ? "rgba(255,255,255,0.15)" : "rgba(26,9,56,0.15)"),
              width: i === activeIndex ? 28 : 8,
              transition: "all 0.3s ease",
            }}
          />
        ))}
      </div>

      {/* Card info label */}
      {bankCards[activeIndex].type === "card" && (
        <div style={{ textAlign:"center", marginTop:6, paddingBottom:4 }}>
          <span style={{ color: isDark ? "rgba(255,255,255,0.85)" : "#1A0938",
            fontSize:14, fontFamily:"'Helvetica Neue',Helvetica,sans-serif", fontWeight:500 }}>
            {bankCards[activeIndex].label}
          </span>
          <span style={{ color: isDark ? "rgba(255,255,255,0.4)" : "rgba(26,9,56,0.4)",
            fontSize:13, fontFamily:"'Helvetica Neue',Helvetica,sans-serif", marginLeft:8 }}>
            •••• {bankCards[activeIndex].last4}
          </span>
        </div>
      )}
    </div>
  );
}

// ─── SPENDING CHART ──────────────────────────────────────────────────────────

const spendingData = [
  { day: "1",  amount: 3200  },
  { day: "6",  amount: 7800  },
  { day: "11", amount: 5400  },
  { day: "16", amount: 12500 },
  { day: "21", amount: 9100  },
  { day: "26", amount: 17300 },
  { day: "30", amount: 20000 },
];

function SpendingChart() {
  const theme = useTheme();
  const isDark = theme === 'dark';
  const [activePoint, setActivePoint] = useState(null);
  const W = 295, H = 72;
  const PAD = { top: 12, bottom: 4, left: 4, right: 4 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const maxAmt = Math.max(...spendingData.map(d => d.amount));

  const pts = spendingData.map((d, i) => ({
    ...d,
    x: PAD.left + (i / (spendingData.length - 1)) * innerW,
    y: PAD.top + innerH - (d.amount / maxAmt) * innerH,
  }));

  // Smooth curve via cubic bezier
  const curve = pts.reduce((acc, pt, i) => {
    if (i === 0) return `M ${pt.x},${pt.y}`;
    const prev = pts[i - 1];
    const cpX = (prev.x + pt.x) / 2;
    return acc + ` C ${cpX},${prev.y} ${cpX},${pt.y} ${pt.x},${pt.y}`;
  }, "");

  const areaPath = curve + ` L ${pts[pts.length-1].x},${H} L ${pts[0].x},${H} Z`;

  return (
    <div className="panel-card flex flex-col gap-2.5 w-full">
      <div className="flex items-start justify-between w-full">
        <MoneyAmount label="You spent this month" amount={activePoint ? activePoint.amount.toLocaleString() : "20,000"}/>
        <img src="https://c.animaapp.com/1v3dLG4K/img/chevron-right-6.svg" alt="" className="w-5 h-5 mt-1"
          style={{filter: isDark ? "none" : "brightness(0) saturate(100%) invert(7%) sepia(60%) saturate(2000%) hue-rotate(255deg)"}}/>
      </div>

      <div className="flex flex-col items-end gap-0.5 w-full" style={{ position: "relative" }}>
        {/* Peak label */}
        <span className="hn-med text-[8px] tracking-tight leading-normal" style={{color: isDark ? "rgba(147,197,253,1)" : "#1e40af"}}>
          EGP {activePoint ? activePoint.amount.toLocaleString() + ".00" : "20,000.00"}
        </span>

        {/* Chart */}
        <svg
          width="100%" viewBox={`0 0 ${W} ${H}`}
          style={{ overflow: "visible", cursor: "crosshair" }}
          onMouseLeave={() => setActivePoint(null)}
          onTouchEnd={() => setTimeout(() => setActivePoint(null), 1800)}
        >
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#6598F0" stopOpacity="0.35"/>
              <stop offset="100%" stopColor="#6598F0" stopOpacity="0.03"/>
            </linearGradient>
          </defs>

          {/* Area fill */}
          <path d={areaPath} fill="url(#areaGrad)"/>

          {/* Line */}
          <path d={curve} fill="none" stroke="#6598F0" strokeWidth="1.8" strokeLinecap="round"/>

          {/* Hover hit zones + dots */}
          {pts.map((pt, i) => {
            const isActive = activePoint && activePoint.day === pt.day;
            return (
              <g key={i}>
                {/* invisible wide hit area */}
                <rect
                  x={pt.x - 18} y={0} width={36} height={H}
                  fill="transparent"
                  onMouseEnter={() => setActivePoint(pt)}
                  onTouchStart={() => setActivePoint(pt)}
                  style={{ cursor: "pointer" }}
                />
                {/* visible dot — only when active */}
                {isActive && (
                  <>
                    {/* vertical guide line */}
                    <line x1={pt.x} y1={pt.y} x2={pt.x} y2={H}
                      stroke="rgba(101,152,240,0.35)" strokeWidth="1" strokeDasharray="3,3"/>
                    {/* outer glow ring */}
                    <circle cx={pt.x} cy={pt.y} r={8} fill="rgba(101,152,240,0.2)"/>
                    {/* dot */}
                    <circle cx={pt.x} cy={pt.y} r={4} fill="#6598F0" stroke="#fff" strokeWidth="1.5"/>
                    {/* tooltip */}
                    <g transform={`translate(${Math.min(Math.max(pt.x - 38, 0), W - 76)}, ${pt.y - 38})`}>
                      <rect x={0} y={0} width={76} height={24} rx={6}
                        fill={isDark ? "rgba(10,22,40,0.95)" : "rgba(255,255,255,0.95)"} stroke="rgba(101,152,240,0.4)" strokeWidth="1"/>
                      <text x={38} y={15} textAnchor="middle"
                        fill="#93C5FD" fontSize="10"
                        fontFamily="Helvetica Neue-Medium, Helvetica, sans-serif">
                        EGP {pt.amount.toLocaleString()}
                      </text>
                    </g>
                  </>
                )}
                {/* always-visible subtle dot */}
                {!isActive && (
                  <circle cx={pt.x} cy={pt.y} r={2} fill="rgba(101,152,240,0.5)"/>
                )}
              </g>
            );
          })}
        </svg>

        {/* Baseline */}
        <div style={{ width: "100%", height: 1, background: "rgba(101,152,240,0.2)" }}/>

        {/* Day labels */}
        <div style={{ display: "flex", justifyContent: "space-between", width: "100%", marginTop: 4 }}>
          {pts.map(pt => (
            <span key={pt.day}
              className="hn-med"
              style={{
                fontSize: 10, letterSpacing: "0.2px",
                color: activePoint && activePoint.day === pt.day
                  ? (isDark ? "rgba(147,197,253,1)" : "#1D4ED8")
                  : (isDark ? "rgba(101,152,240,0.8)" : "rgba(26,9,56,0.45)"),
                fontWeight: activePoint && activePoint.day === pt.day ? "600" : "500",
                transition: "color 0.2s",
              }}>
              {pt.day}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useState('dark');
  const isDark = theme === 'dark';

  // Listen for theme toggle from outside the mockup
  useEffect(() => {
    const handler = (e) => setTheme(e.detail);
    window.addEventListener('theme-change', handler);
    return () => window.removeEventListener('theme-change', handler);
  }, []);

  // Sync phone-screen + scroll background + status bar with theme
  useEffect(() => {
    const screen = document.querySelector('.phone-screen');
    const scroll = document.getElementById('phone-scroll');
    const root  = document.getElementById('root');
    const statusBar = document.getElementById('status-bar');
    const bg = isDark ? '#000' : '#FAFAFA';
    if (screen) screen.style.background = bg;

function GlassSheet({ tab, onClose, isDark }) {
  const item = navItems[tab];
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => { requestAnimationFrame(() => setVisible(true)); }, []);
  const handleClose = () => {
    setVisible(false);
    setTimeout(onClose, 320);
  };
  return (
    <div style={{
      position:"absolute", inset:0, zIndex:200,
      background: isDark ? "rgba(0,0,0,0.45)" : "rgba(0,0,0,0.25)",
      backdropFilter:"blur(6px)", WebkitBackdropFilter:"blur(6px)",
      transition:"background 0.3s ease",
      display:"flex", flexDirection:"column", justifyContent:"flex-end",
    }} onClick={handleClose}>
      <div onClick={e => e.stopPropagation()} style={{
        borderRadius:"24px 24px 0 0",
        background: isDark ? "rgba(18,24,40,0.82)" : "rgba(255,255,255,0.78)",
        backdropFilter:"blur(40px) saturate(180%)",
        WebkitBackdropFilter:"blur(40px) saturate(180%)",
        border: isDark ? "1px solid rgba(255,255,255,0.10)" : "1px solid rgba(255,255,255,0.80)",
        borderBottom:"none",
        boxShadow: isDark
          ? "0 -8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.10)"
          : "0 -8px 40px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.90)",
        padding:"12px 28px 48px",
        transform: visible ? "translateY(0)" : "translateY(100%)",
        transition:"transform 0.32s cubic-bezier(0.32,0.72,0,1)",

              <span style={{ fontFamily:"'Helvetica Neue-Medium',Helvetica",color:txt,fontSize:13,flex:1,paddingRight:12 }}>{f.q}</span>

                width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={isDark ? "rgba(255,255,255,0.4)" : "rgba(0,0,0,0.3)"} strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            {open===i && (
              <div style={{ fontFamily:"'Helvetica Neue-Regular',Helvetica",color:muted,
                fontSize:12,lineHeight:1.7,paddingBottom:12 }}>{f.a}</div>
            )}
          </div>
        ))}
      </div>
    </PlaceholderPage>
  );
}

// Error boundary for debugging
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ color:'#ff6b6b', padding:'20px', fontSize:'12px', fontFamily:'monospace',
          background:'#0d0d14', minHeight:'100%', overflowWrap:'break-word' }}>
          <div style={{ color:'#f87171', fontSize:'14px', fontWeight:'bold', marginBottom:'8px' }}>
            ⚠ Render Error
          </div>
          <div style={{ marginBottom:'8px' }}>{this.state.error?.message}</div>
          <pre style={{ fontSize:'10px', opacity:0.7, whiteSpace:'pre-wrap' }}>
            {this.state.error?.stack}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
